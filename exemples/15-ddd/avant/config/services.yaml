parameters:

services:
    _defaults:
        autowire: true
        autoconfigure: true

    # ──────────────────────────────────────────────────────────────────────────
    # VERSION "SALE" (avant/)
    # Toutes les classes sous src/ sont chargées d'un coup, sans distinction
    # de couche. Symfony découvre les services automatiquement.
    # ──────────────────────────────────────────────────────────────────────────
#    App\:
#        resource: '../src/'
#        exclude:
#            - '../src/DependencyInjection/'
#            - '../src/Entity/'
#            - '../src/Kernel.php'

    # ──────────────────────────────────────────────────────────────────────────
    # VERSION DDD (apres/) — remplacer le bloc App\ ci-dessus par ceci :
    #
    # On charge les trois couches séparément pour rendre les frontières
    # explicites. Le Domain ne doit déclarer AUCUN service Symfony :
    # ses classes sont de simples objets PHP (pas de dépendances framework).
    
    App\Domain\:
        resource: '../src/Domain/'

    App\Application\:
        resource: '../src/Application/'
        # Les Handlers (Command/Query) sont des services autowirés.
        # Ils reçoivent les interfaces du Domain (Repository, etc.)
        # dont les implémentations concrètes viennent d'Infrastructure.

    App\Infrastructure\:
        resource: '../src/Infrastructure/'
        # Contient les implémentations Doctrine, adapters Mailer, etc.
        #exclude:
        #    - '../src/Infrastructure/Doctrine/Migrations/'

    # ── Binding des interfaces du Domain vers les implémentations Infra ────────
    #
    # App\Domain\Repository\CommandeRepositoryInterface: '@App\Infrastructure\Persistence\DoctrineCommandeRepository'
    # App\Domain\Repository\ProduitRepositoryInterface:  '@App\Infrastructure\Persistence\DoctrineProduitRepository'
    #
    # ──────────────────────────────────────────────────────────────────────────
