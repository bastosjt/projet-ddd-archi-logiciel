doctrine:
    dbal:
        url: '%env(resolve:DATABASE_URL)%'
        logging: false

    orm:
        auto_generate_proxy_classes: true
        enable_lazy_ghost_objects: true
        naming_strategy: doctrine.orm.naming_strategy.underscore_number_aware
        auto_mapping: true

        # ──────────────────────────────────────────────────────────────────────
        # VERSION "SALE" (avant/)
        # Les entités Doctrine vivent dans src/Entity/ et embarquent
        # les annotations de mapping directement sur les classes du domaine.
        # Le domaine est donc couplé à Doctrine.
        # ──────────────────────────────────────────────────────────────────────
        #mappings:
#            App:
#                type: attribute
#                is_bundle: false
#                dir: '%kernel.project_dir%/src/Entity'
#                prefix: 'App\Entity'
#                alias: App

        # ──────────────────────────────────────────────────────────────────────
        # VERSION DDD (apres/) — remplacer le bloc "mappings" ci-dessus par :
        #
        # En DDD pur, les entités du Domain ne connaissent pas Doctrine.
        # Le mapping se fait via XML ou YAML dans Infrastructure/, ce qui
        # découple complètement le Domain du framework de persistance.
        #
        mappings:
            Domain:
                type: xml                            # ou 'attribute' si on
                is_bundle: false                     # accepte le couplage léger
                dir: '%kernel.project_dir%/src/Infrastructure/Persistence/Mapping'
                prefix: 'App\Domain\Model'           # ou 'App\Domain\Model'
                alias: Domain

        # Avec ce choix, les classes Domain\Model\Commande etc. n'ont aucun
        # import Doctrine — elles restent de purs objets PHP testables.
        # Les fichiers XML de mapping décrivent la correspondance objet/table.
        # ──────────────────────────────────────────────────────────────────────

when@test:
    doctrine:
        dbal:
            dbname_suffix: '_test%env(default::TEST_TOKEN)%'

when@prod:
    doctrine:
        orm:
            auto_generate_proxy_classes: false
            proxy_dir: '%kernel.build_dir%/doctrine/orm/Proxies'
            query_cache_driver:
                type: pool
                pool: doctrine.system_cache_pool
            result_cache_driver:
                type: pool
                pool: doctrine.result_cache_pool
