services:

  app:
    build: .
    ports:
      - "8089:80"
    volumes:
      - .:/var/www/html
    environment:
      APP_ENV: dev
      APP_SECRET: dev_secret_key_change_me
      DATABASE_URL: "mysql://app:app@mysql:3306/boutique_ddd?serverVersion=8.0&charset=utf8mb4"
      MAILER_DSN: "smtp://mailpit:1025"
      MESSENGER_TRANSPORT_DSN: "doctrine://default"
    depends_on:
      mysql:
        condition: service_healthy
      mailpit:
        condition: service_started
    restart: unless-stopped

  worker:
    build: .
    command: php bin/console messenger:consume async --limit=10 --time-limit=3600 -vv
    volumes:
      - .:/var/www/html
    environment:
      APP_ENV: dev
      APP_SECRET: dev_secret_key_change_me
      DATABASE_URL: "mysql://app:app@mysql:3306/boutique_ddd?serverVersion=8.0&charset=utf8mb4"
      MAILER_DSN: "smtp://mailpit:1025"
      MESSENGER_TRANSPORT_DSN: "doctrine://default"
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: boutique_ddd
      MYSQL_USER: app
      MYSQL_PASSWORD: app
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3309:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "app", "-papp"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"   # Interface web
      - "1025:1025"   # SMTP
    restart: unless-stopped

volumes:
  mysql_data:
